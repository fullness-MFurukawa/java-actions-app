<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品一覧 - CI/CD デモアプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h2 class="h5 mb-0">📦 商品一覧画面(Java)</h2>
        </div>
        <div class="card-body">
            
            <table class="table table-bordered table-hover mt-3" th:if="${not #lists.isEmpty(products)}">
                <thead class="table-light">
                    <tr>
                        <th scope="col" style="width: 8%">ID</th>
                        <th scope="col" style="width: 32%">商品UUID</th>
                        <th scope="col" style="width: 40%">商品名</th>
                        <th scope="col" style="width: 20%">価格 (円)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}" class="text-end">1</td>
                        <td th:text="${product.productUuid}" class="text-muted" style="font-size: 0.85em;">00000000-0000-0000-0000-000000000000</td>
                        <td th:text="${product.name}">ダミー商品名</td>
                        <td th:text="${#numbers.formatInteger(product.price, 1, 'COMMA')}" class="text-end text-danger fw-bold">1,000</td>
                    </tr>
                </tbody>
            </table>

            <div class="alert alert-warning text-center" th:if="${#lists.isEmpty(products)}">
                データベースに商品が登録されていません。
            </div>

        </div>
    </div>
</div>

</body>
</html>
