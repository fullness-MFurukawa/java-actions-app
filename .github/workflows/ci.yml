name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリのチェックアウト
      uses: actions/checkout@v4

    - name: JDK 21のセットアップ (Temurin)
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Gradleによるビルド
      # gradlewに実行権限を付与してから実行
      # -x test を付けることで、テストをスキップして純粋なビルドのみを行う
      run: |
        chmod +x gradlew
        ./gradlew build -x test 
    - name: 単体テストの実行
      # テストタスクのみを実行
      run: ./gradlew test