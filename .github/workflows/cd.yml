# GitHub Actionsの画面上に表示されるワークフローの名前
name: Java CD with Gradle

# ワークフローが実行される条件（トリガー）の定義
on:
  workflow_run:
    # ※ci.ymlの「name:」で指定している名前と完全に一致させる必要がある
    workflows: ["Java CI with Gradle"] 
    types:
      - completed
    branches:
      - main

# 実行するジョブ(作業のまとまり)の定義
jobs:
  deploy: # ジョブの識別名（任意の名前）
    # GitHub側が用意する使い捨ての仮想環境(Runner)のOSを指定
    runs-on: ubuntu-latest
    
    # ジョブ内で順番に実行される手順（ステップ）のリスト
    steps:
      - name: 運用環境へのSSH疎通確認
        # サードパーティ製(コミュニティ作成)のSSH接続アクションを利用
        uses: appleboy/ssh-action@v1.0.3
        # 上記のアクションに渡すパラメータ（引数）の定義
        with:
          # GitHub Secretsから認証情報を安全に取得し、環境に展開(注入)する
          host: ${{ secrets.ACTIONS_AZURE_HOST }}         # 接続先サーバーのIPアドレス
          username: ${{ secrets.ACTIONS_AZURE_USER }}     # ログインユーザー名（ubuntu）
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}      # 秘密鍵（PEM）のテキストデータ
          
          # SSH接続が成功した後に、リモートサーバー上で実行されるシェルコマンド
          # （「|」は複数行の文字列を記述するためのYAMLの記法）
          script: |
            echo "=== SSH Connection Successful ==="
            echo "--- System Information ---"
            uname -a # サーバーのOSやカーネル情報を出力し、Linuxであることを確認
            echo "--- Current User ---"
            whoami   # 実行ユーザーを出力し、指定したユーザーでログインできたか確認
      
      - name: Open JDK 21をプロビジョニング
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          script: |
            #  対話型プロンプトを無効化する設定
            export DEBIAN_FRONTEND=noninteractive
            echo "--- Updating package list ---"
            # -qqを付けると、進捗表示などの細かいログを抑制できる
            sudo apt-get update -qq
            echo "--- Installing OpenJDK 21 ---"
            # 常にデフォルトの設定を選択し、確認画面を出さない
            sudo -E apt-get install -y -qq openjdk-21-jre > /dev/null
            echo "--- Verification ---"
            # Javaのバージョンを標準出力へリダイレクトして表示する
            java -version 2>&1
      
      # 成果物のビルドとファイル転送
      # CDジョブはCIジョブとは別の新しい仮想環境で実行されるため、
      # 再度ソースコードの取得とJava環境のセットアップが必要
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: JDK 21のセットアップ (ビルド用)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 依存ライブラリのダウンロードをキャッシュして高速化

      - name: Gradleによるビルド (パッケージング)
        run: |
          chmod +x gradlew
          # 「-x test」を付与することで、既にCIで確認済みのテストをスキップし、
          # 純粋なビルド(Executable JARの作成)のみを高速に行う。
          ./gradlew build -x test
          # 追加：ビルド成果物フォルダ(build/libs)にSQLファイルをコピーする
          cp SQL/init.sql build/libs/

      - name: 転送先ディレクトリの事前作成
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          # 転送先のディレクトリが存在しないとエラーになるため、事前に作成
          # 「-p」オプションにより、既に存在する場合は何もしない(冪等性)ようにしている
          script: mkdir -p /home/${{ secrets.ACTIONS_AZURE_USER }}/app

      - name: 成果物(JAR)のファイル転送(SCP)
        # 最新版(@master)を指定
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          # 転送元のファイルパス(先ほどのビルドステップで生成されたJARファイル)
          #【修正】カンマ(,)区切りで、コピーした init.sql も転送対象に含め
          source: "build/libs/*.jar,build/libs/init.sql"
          # 転送先のサーバー上のディレクトリパス
          target: "/home/${{ secrets.ACTIONS_AZURE_USER }}/app"
          # 【重要】strip_components: 2 について
          # これを指定しないと、ターゲット配下に「build/libs/〜.jar」という
          # フォルダ階層ごとコピーされてしまう
          # 2を指定することで、最初の2階層(build と libs)を取り除き、appフォルダの直下に直接配置
          strip_components: 2
      
      # データベースの初期化とデータ投入
      - name: データベースの初期化（init.sql の実行）
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}  
          username: ${{ secrets.ACTIONS_AZURE_USER }} 
          key: ${{ secrets.ACTIONS_AZURE_SECRET }} 
          script: |
            echo "--- Executing init.sql against Remote Database ---"     
            
            # SQLスクリプト(init.sql)をpsqlコマンドで実行する
            PGPASSWORD="${{ secrets.AZURE_DB_PASSWORD }}" psql -h ${{ secrets.AZURE_DB_HOST }} -U ${{ secrets.AZURE_DB_USER }} -d postgres -f /home/${{ secrets.ACTIONS_AZURE_USER }}/app/init.sql
            
            echo "--- Verifying Data Insertion ---"
            # 作成された ActionsDB に接続し、productテーブルの件数を確認する
            PGPASSWORD="${{ secrets.AZURE_DB_PASSWORD }}" psql -h ${{ secrets.AZURE_DB_HOST }} -U ${{ secrets.AZURE_DB_USER }} -d ActionsDB -c "SELECT COUNT(*) AS product_total_count FROM product;"
            
            echo "--- Database Initialization Completed ---"

      # Webサーバーの連携とアプリケーションの起動
      - name: リバースプロキシ構成とサービスの起動
        uses: appleboy/ssh-action@master
        with:
          # VM(踏み台サーバー)へSSH接続するための情報をSecretsから取得
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          script: |
            echo "--- Configuring systemd service ---"      
            
            # 【1. systemd サービス定義ファイルの生成】
            sudo bash -c 'cat << EOF > /etc/systemd/system/myapp.service
            [Unit]
            Description=Java Spring Boot Application
            
            [Service]
            WorkingDirectory=/home/${{ secrets.ACTIONS_AZURE_USER }}/app
            
            # 起動コマンド：javaコマンドでJARファイルを実行し、内蔵Tomcatを8080番ポートで起動
            ExecStart=/usr/bin/java -jar /home/${{ secrets.ACTIONS_AZURE_USER }}/app/java-actions-app-0.0.1-SNAPSHOT.jar
            
            Restart=always
            RestartSec=10
            SyslogIdentifier=java-myapp
            User=${{ secrets.ACTIONS_AZURE_USER }}
            Environment=SPRING_PROFILES_ACTIVE=prod
            
            # データベースの接続情報を環境変数として注入（Secretsの活用）
            Environment=SPRING_DATASOURCE_URL=jdbc:postgresql://${{ secrets.AZURE_DB_HOST }}:5432/ActionsDB
            Environment=SPRING_DATASOURCE_USERNAME=${{ secrets.AZURE_DB_USER }}
            Environment=SPRING_DATASOURCE_PASSWORD=${{ secrets.AZURE_DB_PASSWORD }}
            
            [Install]
            WantedBy=multi-user.target
            EOF'

            echo "--- Configuring Nginx ---"
            
            # 【2. Nginx リバースプロキシ設定の生成】
            sudo bash -c 'cat << EOF > /etc/nginx/sites-available/default
            server {
                listen 80;
                server_name _;
                
                location / {
                    proxy_pass http://localhost:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection keep-alive;
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF'

            echo "--- Reloading Daemons and Restarting Services ---"
            
            # 【3. 設定の反映とサービスの起動】
            sudo systemctl daemon-reload
            sudo systemctl enable myapp.service
            sudo systemctl restart myapp.service

            # --- ここから追加 ---
            echo "--- Switching Nginx Configuration ---"
            # 昨日のNext.jsの設定(ショートカット)が存在すれば削除して無効化する
            sudo rm -f /etc/nginx/sites-enabled/ts-actions-app
            sudo rm -f /etc/nginx/sites-enabled/nextjs-app
            
            # 今日作成したJava用(default)の設定のショートカットを作成して有効化する
            sudo ln -sf /etc/nginx/sites-available/default /etc/nginx/sites-enabled/default
            # --- ここまで追加 ---


            sudo systemctl restart nginx
            
            echo "--- Deployment Completed Successfully! ---"
