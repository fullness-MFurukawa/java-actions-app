# GitHub Actionsの画面上に表示されるワークフローの名前
name: Java CD with Gradle

# ワークフローが実行される条件（トリガー）の定義
on:
  workflow_run:
    # ※ci.ymlの「name:」で指定している名前と完全に一致させる必要がある
    workflows: ["Java CI with Gradle"] 
    types:
      - completed
    branches:
      - main

# 実行するジョブ(作業のまとまり)の定義
jobs:
  deploy: # ジョブの識別名（任意の名前）
    # GitHub側が用意する使い捨ての仮想環境(Runner)のOSを指定
    runs-on: ubuntu-latest
    
    # ジョブ内で順番に実行される手順（ステップ）のリスト
    steps:
      - name: 運用環境へのSSH疎通確認
        # サードパーティ製(コミュニティ作成)のSSH接続アクションを利用
        uses: appleboy/ssh-action@v1.0.3
        # 上記のアクションに渡すパラメータ（引数）の定義
        with:
          # GitHub Secretsから認証情報を安全に取得し、環境に展開(注入)する
          host: ${{ secrets.ACTIONS_AZURE_HOST }}         # 接続先サーバーのIPアドレス
          username: ${{ secrets.ACTIONS_AZURE_USER }}     # ログインユーザー名（ubuntu）
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}      # 秘密鍵（PEM）のテキストデータ
          
          # SSH接続が成功した後に、リモートサーバー上で実行されるシェルコマンド
          # （「|」は複数行の文字列を記述するためのYAMLの記法）
          script: |
            echo "=== SSH Connection Successful ==="
            echo "--- System Information ---"
            uname -a # サーバーのOSやカーネル情報を出力し、Linuxであることを確認
            echo "--- Current User ---"
            whoami   # 実行ユーザーを出力し、指定したユーザーでログインできたか確認
      
      - name: Open JDK 21をプロビジョニング
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          script: |
            #  対話型プロンプトを無効化する設定
            export DEBIAN_FRONTEND=noninteractive
            echo "--- Updating package list ---"
            # -qqを付けると、進捗表示などの細かいログを抑制できる
            sudo apt-get update -qq
            echo "--- Installing OpenJDK 21 ---"
            # 常にデフォルトの設定を選択し、確認画面を出さない
            sudo -E apt-get install -y -qq openjdk-21-jre > /dev/null
            echo "--- Verification ---"
            # Javaのバージョンを標準出力へリダイレクトして表示する
            java -version 2>&1
      
      # 成果物のビルドとファイル転送
      # CDジョブはCIジョブとは別の新しい仮想環境で実行されるため、
      # 再度ソースコードの取得とJava環境のセットアップが必要
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: JDK 21のセットアップ (ビルド用)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # 依存ライブラリのダウンロードをキャッシュして高速化

      - name: Gradleによるビルド (パッケージング)
        run: |
          chmod +x gradlew
          # 「-x test」を付与することで、既にCIで確認済みのテストをスキップし、
          # 純粋なビルド(Executable JARの作成)のみを高速に行う。
          ./gradlew build -x test

      - name: 転送先ディレクトリの事前作成
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          # 転送先のディレクトリが存在しないとエラーになるため、事前に作成
          # 「-p」オプションにより、既に存在する場合は何もしない(冪等性)ようにしている
          script: mkdir -p /home/${{ secrets.ACTIONS_AZURE_USER }}/app

      - name: 成果物(JAR)のファイル転送(SCP)
        # 最新版(@master)を指定
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ACTIONS_AZURE_HOST }}
          username: ${{ secrets.ACTIONS_AZURE_USER }}
          key: ${{ secrets.ACTIONS_AZURE_SECRET }}
          # 転送元のファイルパス(先ほどのビルドステップで生成されたJARファイル)
          source: "build/libs/*.jar"
          # 転送先のサーバー上のディレクトリパス
          target: "/home/${{ secrets.ACTIONS_AZURE_USER }}/app"
          # 【重要】strip_components: 2 について
          # これを指定しないと、ターゲット配下に「build/libs/〜.jar」という
          # フォルダ階層ごとコピーされてしまう
          # 2を指定することで、最初の2階層(build と libs)を取り除き、appフォルダの直下に直接配置
          strip_components: 2
